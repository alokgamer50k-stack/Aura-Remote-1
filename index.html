<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstuTECH Admin Panel</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #6200ea; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; }
        button:hover { background: #7c4dff; }
        #status { margin-top: 15px; color: #00e676; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔧 Profile Settings</h2>
        
        <label>Player UID:</label>
        <input type="text" id="uid" placeholder="Enter UID (e.g. 123456789)">

        <label>Safe Mode (Unlock ID):</label>
        <select id="isUnlocked">
            <option value="false">Locked (Don't let them play)</option>
            <option value="true">Unlocked (Let them play)</option>
        </select>

        <label>Diamonds:</label>
        <input type="number" id="diamonds" value="99999">

        <label>Gold:</label>
        <input type="number" id="gold" value="105487">

        <label>Level:</label>
        <input type="number" id="level" value="100">

        <label>V-Badge:</label>
        <select id="vBadge">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </select>

        <button onclick="saveData()">Save / Update Player</button>
        <div id="status"></div>
    </div>

    <script>
        function saveData() {
            const uid = document.getElementById('uid').value;
            if(!uid) return alert("Please enter UID!");

            const data = {
                uid: uid,
                isUnlocked: document.getElementById('isUnlocked').value,
                diamonds: document.getElementById('diamonds').value,
                gold: document.getElementById('gold').value,
                level: document.getElementById('level').value,
                vBadge: document.getElementById('vBadge').value
            };

            fetch('/api/updateUser', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(resData => {
                document.getElementById('status').innerText = resData.message;
            });
        }
    </script>
</body>
                          </html>
